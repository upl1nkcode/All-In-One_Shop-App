<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Monitor — AllInOne Shop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { padding: 1.5rem 2rem; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }
    .actions { display: flex; align-items: center; gap: .5rem; }
    .refresh-btn { background: #0ea5e9; color: #fff; border: none; border-radius: 8px; padding: .5rem 1rem; cursor: pointer; font-size: .85rem; }
    .refresh-btn:hover { background: #0284c7; }
    .clear-btn { background: #ef4444; color: #fff; border: none; border-radius: 8px; padding: .5rem 1rem; cursor: pointer; font-size: .85rem; }
    .clear-btn:hover { background: #dc2626; }
    #last-updated { font-size: .78rem; color: #64748b; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; padding: 2rem; }
    .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; }
    .stat-card .label { font-size: .72rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
    .sections { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; padding: 0 2rem 2rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
    .card h2 { font-size: .95rem; font-weight: 600; margin-bottom: 1rem; color: #f1f5f9; }
    .bar-row { display: flex; align-items: center; gap: .75rem; margin-bottom: .5rem; }
    .bar-label { width: 130px; font-size: .82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #cbd5e1; }
    .bar-track { flex: 1; background: #0f172a; border-radius: 4px; height: 8px; }
    .bar-fill { height: 8px; border-radius: 4px; background: #38bdf8; }
    .bar-count { width: 30px; text-align: right; font-size: .78rem; color: #94a3b8; }
    .event-row { display: flex; gap: .6rem; padding: .45rem 0; border-bottom: 1px solid #334155; font-size: .78rem; align-items: flex-start; }
    .event-row:last-child { border-bottom: none; }
    .event-type { background: #334155; border-radius: 4px; padding: .1rem .4rem; font-size: .68rem; white-space: nowrap; color: #7dd3fc; flex-shrink: 0; }
    .event-payload { color: #94a3b8; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event-meta { color: #475569; font-size: .7rem; white-space: nowrap; }
    .empty { color: #475569; font-size: .85rem; }
    .full-width { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <header>
    <h1>Activity Monitor</h1>
    <div class="actions">
      <span id="last-updated"></span>
      <button class="refresh-btn" onclick="loadStats()">Refresh</button>
      <button class="clear-btn" onclick="clearEvents()">Clear All</button>
    </div>
  </header>

  <div class="stat-grid">
    <div class="stat-card"><div class="label">Total Events</div><div class="value" id="total-events">—</div></div>
    <div class="stat-card"><div class="label">Unique Sessions</div><div class="value" id="unique-sessions">—</div></div>
    <div class="stat-card"><div class="label">Page Views</div><div class="value" id="page-views">—</div></div>
    <div class="stat-card"><div class="label">Searches</div><div class="value" id="searches">—</div></div>
    <div class="stat-card"><div class="label">Product Clicks</div><div class="value" id="product-clicks">—</div></div>
  </div>

  <div class="sections">
    <div class="card"><h2>Events by Type</h2><div id="events-by-type"></div></div>
    <div class="card"><h2>Top Searches</h2><div id="top-searches"></div></div>
    <div class="card"><h2>Top Pages</h2><div id="top-pages"></div></div>
    <div class="card"><h2>Top Product Clicks</h2><div id="top-products"></div></div>
    <div class="card full-width"><h2>Recent Events (last 20)</h2><div id="recent-events"></div></div>
  </div>

  <script>
    async function loadStats() {
      const res = await fetch('/api/stats').catch(() => null);
      if (!res) return;
      const d = await res.json();

      document.getElementById('total-events').textContent = d.totalEvents;
      document.getElementById('unique-sessions').textContent = d.uniqueSessions;
      document.getElementById('page-views').textContent = d.eventsByType['PAGE_VIEW'] || 0;
      document.getElementById('searches').textContent = d.eventsByType['SEARCH'] || 0;
      document.getElementById('product-clicks').textContent = d.eventsByType['PRODUCT_CLICK'] || 0;
      document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

      bars('events-by-type', Object.entries(d.eventsByType).map(([l, c]) => ({ label: l, count: c })));
      bars('top-searches', d.topSearches.map(s => ({ label: s.query, count: s.count })));
      bars('top-pages', d.topPages.map(p => ({ label: p.path, count: p.count })));
      bars('top-products', d.topProducts.map(p => ({ label: p.productName, count: p.count })));
      recent(d.recentEvents);
    }

    function bars(id, items) {
      const el = document.getElementById(id);
      if (!items.length) { el.innerHTML = '<p class="empty">No data yet</p>'; return; }
      const max = Math.max(...items.map(i => i.count));
      el.innerHTML = items.map(i =>
        `<div class="bar-row">
          <div class="bar-label" title="${i.label}">${i.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(i.count/max*100)}%"></div></div>
          <div class="bar-count">${i.count}</div>
        </div>`
      ).join('');
    }

    function recent(events) {
      const el = document.getElementById('recent-events');
      if (!events.length) { el.innerHTML = '<p class="empty">No events yet</p>'; return; }
      el.innerHTML = events.map(e =>
        `<div class="event-row">
          <span class="event-type">${e.type}</span>
          <span class="event-payload">${JSON.stringify(e.payload)}</span>
          <span class="event-meta">${new Date(e.timestamp).toLocaleTimeString()} · ${e.sessionId.slice(0,8)}</span>
        </div>`
      ).join('');
    }

    async function clearEvents() {
      if (!confirm('Clear all recorded events?')) return;
      await fetch('/api/events', { method: 'DELETE' });
      loadStats();
    }

    loadStats();
    setInterval(loadStats, 10_000);
  </script>
</body>
</html>
