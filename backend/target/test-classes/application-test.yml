spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude: com.allinoneshop.config.MeilisearchConfig

jwt:
  secret: test-secret-key-for-unit-testing-only-at-least-256-bits-long-enough
  expiration: 86400000

cors:
  allowed-origins: http://localhost:3000

meilisearch:
  host: http://localhost:7700
  api-key: test-key
